{% extends 'base.html' %}
{% block content %}
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-4 rounded-4">
                    
                    <h2 class="fw-bold mb-4">
                        <span class="text-primary"></span>Delete Contact
                    </h2>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="name" class="form-control p-2" value="{{contact.f_name}}" placeholder="Name" required>
                        </div>
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="phone" name="phone" class="form-control p-2" value="{{contact.phone}}" placeholder="Phone" required>
                        </div>
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*"> 
                            </div>
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category</label>
                            <select name="category" class="form-select p-2" required>
                                <option value="{{contact.category}}">{{ contact.category }}</option>
                                {% for i in category_list %}
                                <option value="{{i.id}}">{{i.name}}</option>
                                {% endfor %}
                            </select>
                            <a href="add_category/" class="add-btn w-100 mt-auto text-decoration-none d-inline-block text-center"> Add Category
                            </a>
                        </div>
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <input type="text" name="address" class="form-control p-2" value="{{contact.address}}" placeholder="Address" required>
                        </div>
                    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Notes</label>
                            <textarea name="notes" class="form-control p-2" rows="4"placeholder="About..." required>{{ contact.notes }}</textarea>
                        </div>
                    
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg fw-bold shadow-sm">Delete</button>
                            <a href="/home" class="btn btn-light border py-2 text-muted">Cancel</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

{% endblock %}
