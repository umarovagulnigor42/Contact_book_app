{% extends 'base.html' %}
{% block content %}
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .contact-list {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            list-style: none;
            padding: 0;
        }

        .list-header {
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid #f0f0f0;
            color: #333;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            transition: 0.2s;
        }

        .contact-item:hover {
            background-color: #fcfcfc;
        }

        .avatar {
            width: 50px;       /* Avatar joyi uchun aniq kenglik */
            height: 50px;      /* Aniq balandlik */
            flex-shrink: 0;    /* Rasm siqilib qolmasligi yoki surilib ketmasligi uchun */
            margin-right: 15px;
            border-radius: 50%; /* Doira shakli */
            overflow: hidden;   /* Rasmdan ortiqcha qismini qirqib tashlash */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5; /* Rasm yo'q bo'lsa orqa fon */
        }

        .avatar img {
            width: 100%;       /* Rasmni 50px ga moslaydi */
            height: 100%;      /* Rasmni 50px ga moslaydi */
            object-fit: cover; /* Rasmni cho'zib yubormasdan, doira ichiga chiroyli joylaydi */
        }

        .contact-info {
            flex-grow: 1;
        }

        .contact-name {
            display: block;
            font-weight: 600;
            color: #2d3436;
        }

        .contact-title {
            font-size: 0.85rem;
            color: #b2bec3;
        }

        /* Tugmalar uchun qism */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            background: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        /* Update (Tahrirlash) tugmasi */
        .btn-update {
            color: #0984e3;
            background-color: #e1f0ff;
        }

        .btn-update:hover {
            background-color: #0984e3;
            color: white;
        }

        /* Delete (O'chirish) tugmasi */
        .btn-delete {
            color: #d63031;
            background-color: #ffeaea;
        }

        .btn-delete:hover {
            background-color: #d63031;
            color: white;
        }
    </style>
</head>
<body>

    <ul class="contact-list">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <li class="list-header m-0" style="list-style: none;">Contacts</li>
            <a href="/home" class="btn btn-light border py-1 px-3 text-muted me-3">Back</a>
        </div>
    {% for i in all_contacts %}
    <li class="contact-item">
        <div class="avatar">
            {% if i.image %}
                <img src="{{ i.image.url }}" alt="{{ i.f_name }}">
            {% else %}
                <i class="fa-solid fa-user" style="color: #ccc;"></i>
            {% endif %}
        </div>
        <div class="contact-info">
            
            <span class="contact-name"><a href="/contact/detail/{{i.id}}">{{ i.f_name}}</a></span>
            <span class="contact-title">{{ i.notes}}</span>
        </div>
        <div class="actions">
            <button class="btn btn-update" title="Update">
                <a href="/contact/update/{{i.id}}"><i class="fa-solid fa-pen-to-square"></i></a>
            </button>
            <button class="btn btn-delete" title="Delete">
                <a href="/contact/delete/{{i.id}}"><i class="fa-solid fa-trash-can"></i></a>
            </button>
        </div>
    </li>
    {% endfor %}
</ul>
 
{% endblock %}
