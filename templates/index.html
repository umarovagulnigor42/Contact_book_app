{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 1000px;">
    <style>
        /* Tepada turuvchi tugmalar uchun maxsus stil */
        .top-actions-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin: 20px 0 10px 0;
        }
    
        .top-btn {
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 8px;
            background-color: #0d6efd; /* Bootstrap ko'k rangi */
            color: white !important;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
    
        .top-btn:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }
    
        .logout-link {
            color: #dc3545 !important;
            font-weight: bold;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
    
    <div class="top-actions-wrapper">
            <a href="/all_contacts/">All Contacts</a>
            <a href="/category_list/">All Categories</a>
            <a href="/logout/" class="logout-link">LOGOUT</a>
    </div>
    
    <div class="main-wrapper">
        <div class="dashboard-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="bi bi-person fs-2 me-2"></i>
                <span class="fw-bold">Contacts Dashboard</span>
            </div>
            <form class="d-flex" role="search" action="/search/" method="get" >
                <input type="text" name="search" placeholder="Search..." class="form-control me-2">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>                                                                                                                                                            
        
        <div class="p-4">
            <div class="row g-4"> <div class="col-md-6">
                    <div class="card custom-card main-stat-card h-100 shadow-sm">
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-person fs-2 me-2"></i>
                        </a>
                        
                            <span class="fs-5">Total Contacts</span>
                        </div>
                        <h1 class="display-2 fw-bold mb-4">{{ total_contacts }}</h1>
                        <a href="/add_contact/" class="add-btn w-100 mt-auto text-decoration-none d-inline-block text-center my-2">
                            <i class="bi bi-plus-lg me-2"></i> Add Contact
                        </a>
                        <a href="/add_category/" class="add-btn w-100 mt-auto text-decoration-none d-inline-block text-center">
                            <i class="bi bi-plus-lg me-2"></i> Add Category
                        </a>
                    </div>
                </div>

                <div class="col-md-6"> 
                    <div class="d-flex flex-column gap-3">
                         {% for i in category_objects %}
                    <div class="card p-3 shadow-sm border-0 d-flex flex-row align-items-center justify-content-between" 
                         style="border-radius: 12px; background-color: #5e72e4; color: white;">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-house-door-fill fs-3 me-3"></i>
                            <span class="fw-bold fs-5"><a href="/contact_list/{{ i.id }}" class="fs-5 fw-bold text-white">{{ i.name }}</a></span>
                        </div>
                        <span class="fs-4 fw-bold">{{ i.user_contacts_count }}</span>
                        
                        
                    </div>
                {% endfor %}
        
            </div>
        </div>
            </div> 
        </div> 
    </div>
</div>

{% endblock %}
